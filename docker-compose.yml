version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: javachilapeno-postgres
    environment:
      POSTGRES_DB: javachilapeno
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: javachilapeno-app
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/javachilapeno
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres-data:
